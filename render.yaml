services:
  - type: web
    name: avi-oren-aviation-phase2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@avioren.local
      - key: ADMIN_PASSWORD
        value: ChangeMe123!
